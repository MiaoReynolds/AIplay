<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOne Lab — AI 助理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99,102,241,0.25);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --user-bubble: #6366f1;
            --ai-bubble: #1e2235;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Header ─── */
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 14px var(--accent-glow);
            flex-shrink: 0;
        }

        .header-info h1 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #4ade80;
            margin-top: 1px;
        }
        .status-dot::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header-badge {
            margin-left: auto;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ─── Messages area ─── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ─── Bubbles ─── */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: fadeUp 0.25s ease-out;
        }
        .message-row.user { flex-direction: row-reverse; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .bubble-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .bubble-avatar.ai-av { background: linear-gradient(135deg, #6366f1, #a855f7); }
        .bubble-avatar.user-av { background: var(--surface2); border: 1px solid var(--border); }

        .bubble {
            max-width: 72%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            word-break: break-word;
        }
        .bubble.ai {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }
        .bubble.user {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }

        /* typing dots */
        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 2px;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: blink 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* ─── Suggestions ─── */
        #suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 24px 12px;
        }
        .suggestion-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.18s;
        }
        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--accent-hover);
            background: rgba(99,102,241,0.1);
        }

        /* ─── Input bar ─── */
        #input-bar {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 14px 24px 18px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            padding: 11px 16px;
            border-radius: 12px;
            resize: none;
            outline: none;
            max-height: 120px;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        #user-input::placeholder { color: var(--text-muted); }
        #user-input:focus { border-color: var(--accent); }

        #send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        #send-btn:hover { background: var(--accent-hover); box-shadow: 0 6px 20px var(--accent-glow); }
        #send-btn:active { transform: scale(0.93); }
        #send-btn:disabled { background: var(--surface2); box-shadow: none; cursor: not-allowed; }
        #send-btn svg { fill: white; }

        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 24px 10px;
            flex-shrink: 0;
        }

        /* error state */
        .bubble.error { border-color: #ef4444; color: #f87171; background: rgba(239,68,68,0.07); }
    </style>
</head>
<body>

<header>
    <div class="avatar">🤖</div>
    <div class="header-info">
        <h1>AIOne Lab 智能助理</h1>
        <div class="status-dot">在线 · Cloudflare Workers AI</div>
    </div>
    <span class="header-badge">Beta</span>
</header>

<div id="messages">
    <div class="message-row" id="welcome-row">
        <div class="bubble-avatar ai-av">🤖</div>
        <div class="bubble ai">你好！我是 AIOne Lab 的 AI 助理，由 Cloudflare Workers AI 驱动。<br><br>有什么可以帮到你的吗？😊</div>
    </div>
</div>

<div id="suggestions">
    <span class="suggestion-chip" onclick="sendSuggestion('你能做什么？')">你能做什么？</span>
    <span class="suggestion-chip" onclick="sendSuggestion('介绍一下 Cloudflare Workers AI')">介绍 Cloudflare Workers AI</span>
    <span class="suggestion-chip" onclick="sendSuggestion('帮我写一段 Python 代码示例')">写 Python 示例</span>
</div>

<div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="输入消息，按 Enter 发送…"></textarea>
    <button id="send-btn" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    const WORKER_URL = "https://red-feather-3773.mb-miaobin.workers.dev/";

    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const suggestionsEl = document.getElementById('suggestions');

    let isLoading = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
    sendBtn.addEventListener('click', handleSend);

    function sendSuggestion(text) {
        inputEl.value = text;
        suggestionsEl.style.display = 'none';
        handleSend();
    }

    function appendMessage(role, content, isTyping = false) {
        const row = document.createElement('div');
        row.className = `message-row ${role}`;

        const av = document.createElement('div');
        av.className = `bubble-avatar ${role === 'user' ? 'user-av' : 'ai-av'}`;
        av.textContent = role === 'user' ? '👤' : '🤖';

        const bubble = document.createElement('div');
        bubble.className = `bubble ${role}`;

        if (isTyping) {
            bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
        } else {
            // Preserve line breaks
            bubble.textContent = content;
            bubble.style.whiteSpace = 'pre-wrap';
        }

        if (role === 'user') {
            row.appendChild(bubble);
            row.appendChild(av);
        } else {
            row.appendChild(av);
            row.appendChild(bubble);
        }

        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
    }

    async function handleSend() {
        const text = inputEl.value.trim();
        if (!text || isLoading) return;

        // Hide suggestions once user starts chatting
        suggestionsEl.style.display = 'none';

        isLoading = true;
        sendBtn.disabled = true;
        inputEl.value = '';
        inputEl.style.height = 'auto';

        appendMessage('user', text);

        // Show typing indicator
        const typingBubble = appendMessage('ai', '', true);

        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: text }]
                })
            });

            let aiText = '';

            if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
            }

            // Try JSON first, fall back to text
            const contentType = res.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                const data = await res.json();
                // Support multiple response shapes
                aiText = data?.result?.response
                    ?? data?.response
                    ?? data?.choices?.[0]?.message?.content
                    ?? data?.choices?.[0]?.text
                    ?? JSON.stringify(data);
            } else {
                aiText = await res.text();
            }

            typingBubble.innerHTML = '';
            typingBubble.style.whiteSpace = 'pre-wrap';
            typingBubble.textContent = aiText;
        } catch (err) {
            typingBubble.classList.add('error');
            typingBubble.innerHTML = '';
            typingBubble.textContent = `⚠️ 请求失败：${err.message}`;
            console.error('[AI Assistant]', err);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            inputEl.focus();
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
    }
</script>
</body>
</html>
