<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助理</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── 悬浮触发按钮 ── */
        #ai-chat-toggle {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f7cff, #1a56db);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(79, 124, 255, 0.45);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 9999;
        }
        #ai-chat-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 28px rgba(79, 124, 255, 0.6);
        }
        #ai-chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* ── 聊天窗口 ── */
        #ai-chat-window {
            display: none;
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 380px;
            height: 560px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.18);
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .chat-header {
            background: linear-gradient(135deg, #4f7cff, #1a56db);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-avatar {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .chat-title { font-size: 15px; font-weight: 600; }
        .chat-subtitle { font-size: 12px; opacity: 0.8; margin-top: 1px; }

        #close-chat {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            opacity: 0.8;
            line-height: 1;
            padding: 4px;
            border-radius: 6px;
            transition: opacity 0.15s, background 0.15s;
        }
        #close-chat:hover { opacity: 1; background: rgba(255,255,255,0.15); }

        /* ── 消息区 ── */
        #ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f7f8fc;
        }
        #ai-messages::-webkit-scrollbar { width: 4px; }
        #ai-messages::-webkit-scrollbar-thumb { background: #d0d5e8; border-radius: 4px; }

        .msg-bubble {
            max-width: 82%;
            padding: 10px 14px;
            font-size: 14px;
            line-height: 1.55;
            border-radius: 16px;
            word-break: break-word;
        }
        .msg-bubble.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f7cff, #1a56db);
            color: white;
            border-radius: 16px 16px 4px 16px;
        }
        .msg-bubble.ai {
            align-self: flex-start;
            background: white;
            color: #333;
            border: 1px solid #e8eaf0;
            border-radius: 16px 16px 16px 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .msg-bubble.ai.loading { color: #999; font-style: italic; }

        /* ── 欢迎提示 ── */
        .welcome-msg {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin-top: 8px;
        }

        /* ── 输入区 ── */
        .chat-footer {
            padding: 12px 14px;
            border-top: 1px solid #eef0f5;
            display: flex;
            gap: 8px;
            background: white;
            flex-shrink: 0;
        }
        #ai-input {
            flex: 1;
            border: 1.5px solid #e0e4f0;
            border-radius: 12px;
            padding: 9px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            font-family: inherit;
        }
        #ai-input:focus { border-color: #4f7cff; }
        #ai-send {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f7cff, #1a56db);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.15s;
        }
        #ai-send:hover { opacity: 0.88; transform: scale(1.05); }
        #ai-send svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>

<!-- 悬浮触发按钮 -->
<button id="ai-chat-toggle" title="打开 AI 助理">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.253 2 11.5c0 2.304.87 4.41 2.306 6.033L3 21l3.644-1.154A10.03 10.03 0 0 0 12 21c5.523 0 10-4.253 10-9.5S17.523 2 12 2zm0 2c4.418 0 8 3.358 8 7.5S16.418 19 12 19a8.03 8.03 0 0 1-3.434-.767l-.35-.17-2.28.723.597-2.396-.216-.32A7.358 7.358 0 0 1 4 11.5C4 7.358 7.582 4 12 4zm-2.5 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm2.5 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm2.5 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
    </svg>
</button>

<!-- 聊天窗口 -->
<div id="ai-chat-window">
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="chat-avatar">🤖</div>
            <div>
                <div class="chat-title">AI 助理</div>
                <div class="chat-subtitle">由 GPT-4o mini 驱动</div>
            </div>
        </div>
        <button id="close-chat" title="关闭">✕</button>
    </div>

    <div id="ai-messages">
        <div class="welcome-msg">你好！有什么可以帮助你的吗？</div>
    </div>

    <div class="chat-footer">
        <textarea id="ai-input" rows="1" placeholder="输入问题，按 Enter 发送…"></textarea>
        <button id="ai-send" title="发送">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    const WORKER_URL = "https://red-feather-3773.mb-miaobin.workers.dev/";

    const toggleBtn   = document.getElementById('ai-chat-toggle');
    const chatWindow  = document.getElementById('ai-chat-window');
    const closeBtn    = document.getElementById('close-chat');
    const sendBtn     = document.getElementById('ai-send');
    const inputField  = document.getElementById('ai-input');
    const msgContainer = document.getElementById('ai-messages');

    // 窗口开关
    toggleBtn.onclick = () => {
        chatWindow.style.display = 'flex';
        toggleBtn.style.display = 'none';
    };
    closeBtn.onclick = () => {
        chatWindow.style.display = 'none';
        toggleBtn.style.display = 'flex';
    };

    // 气泡生成
    function appendMessage(role, text, id = null) {
        const div = document.createElement('div');
        div.className = `msg-bubble ${role}${role === 'ai' && text === '正在思考…' ? ' loading' : ''}`;
        if (id) div.id = id;
        div.innerText = text;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // 核心发送
    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text) return;

        appendMessage('user', text);
        inputField.value = '';
        inputField.style.height = 'auto';

        const loadingId = "loading-" + Date.now();
        appendMessage('ai', '正在思考…', loadingId);

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [{ role: "user", content: text }]
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();

            // ✅ 正确解析路径：choices[0].message.content
            if (data.choices && data.choices.length > 0 && data.choices[0].message) {
                appendMessage('ai', data.choices[0].message.content);
            } else {
                console.error("响应结构异常:", data);
                appendMessage('ai', "抱歉，回复解析失败，请查看控制台。");
            }

        } catch (err) {
            console.error("请求错误:", err);
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();
            appendMessage('ai', "抱歉，连接超时或接口异常。");
        }
    }

    sendBtn.onclick = sendMessage;

    // Enter 发送，Shift+Enter 换行
    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // textarea 自动撑高
    inputField.addEventListener('input', () => {
        inputField.style.height = 'auto';
        inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
    });
</script>
</body>
</html>
