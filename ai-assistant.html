<script>
    // 1. 确保这是你的 Cloudflare Worker 地址 (末尾斜杠不影响)
    const WORKER_URL = "https://red-feather-3773.mb-miaobin.workers.dev/"; 

    const toggleBtn = document.getElementById('ai-chat-toggle');
    const chatWindow = document.getElementById('ai-chat-window');
    const closeBtn = document.getElementById('close-chat');
    const sendBtn = document.getElementById('ai-send');
    const inputField = document.getElementById('ai-input');
    const msgContainer = document.getElementById('ai-messages');

    // 窗口开关逻辑
    toggleBtn.onclick = () => { chatWindow.style.display = 'flex'; toggleBtn.style.display = 'none'; };
    closeBtn.onclick = () => { chatWindow.style.display = 'none'; toggleBtn.style.display = 'flex'; };

    // 核心发送函数
    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text) return;

        // 插入用户气泡
        appendMessage('user', text);
        inputField.value = '';

        // 插入加载占位符
        const loadingId = "loading-" + Date.now();
        appendMessage('ai', '正在思考...', loadingId);

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gpt-4o-mini", 
                    messages: [{ role: "user", content: text }]
                })
            });

            // 如果 HTTP 状态码不是 200，直接报错
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();
            
            // 移除加载占位符
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();

            // --- 关键解析路径：对应你截图中的 Response 结构 ---
            if (data.choices && data.choices.length > 0 && data.choices.message) {
                const aiText = data.choices.message.content; // 👈 就是这里！
                appendMessage('ai', aiText);
            } else {
                console.error("数据结构不符合预期:", data);
                appendMessage('ai', "抱歉，回复内容解析失败，请检查控制台。");
            }

        } catch (err) {
            console.error("请求发生错误:", err);
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();
            appendMessage('ai', "抱歉，连接超时或接口异常。");
        }
    }

    // 气泡生成函数
    function appendMessage(role, text, id = null) {
        const div = document.createElement('div');
        if(id) div.id = id;
        
        div.style.maxWidth = "85%";
        div.style.padding = "10px 14px";
        div.style.fontSize = "14px";
        div.style.lineHeight = "1.5";
        div.style.marginBottom = "10px";
        
        if (role === 'user') {
            div.style.alignSelf = "flex-end";
            div.style.background = "#007bff";
            div.style.color = "white";
            div.style.borderRadius = "15px 15px 0 15px";
            div.style.marginLeft = "auto"; // 靠右
        } else {
            div.style.alignSelf = "flex-start";
            div.style.background = "white";
            div.style.color = "#444";
            div.style.border = "1px solid #eee";
            div.style.borderRadius = "15px 15px 15px 0";
            div.style.marginRight = "auto"; // 靠左
        }
        
        div.innerText = text;
        msgContainer.appendChild(div);
        
        // 确保新消息出来后自动滚到底部
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // 绑定回车和点击事件
    sendBtn.onclick = sendMessage;
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
