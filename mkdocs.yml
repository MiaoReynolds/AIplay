          - Codex Skills: projects/codex-skills.md
      - AIGC:
          - Prompt Generator: prompt-generator.md
          - Image Prompt Generator: text-to-image-prompt-generator.md
          - NotebookLM Tutorial: projects/notebooklm-tutorial.md
          - Vibe Coding: projects/vibe-coding.md
