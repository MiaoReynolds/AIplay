site_name: AIone Lab
site_url: https://github.com/MiaoReynolds/AIplay.git
site_author: Reynolds

theme:
  name: material
  logo: assets/images/A_logo_cropped.png
  favicon: assets/images/A_logo_cropped.png
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

