      # - Building the Display Device: tutorials/screen-howto.md
      # - Setting Up LeRobot: tutorials/lerobot-setup.md

  - About: about.md
  - Contact: contact.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: docs
  - md_in_html

extra_css:
  - stylesheets/extra.css
